services:
  mongodb:
    image: mongo:noble
    container_name: mongo_ecommerce
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7
    container_name: redis_ecommerce
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
